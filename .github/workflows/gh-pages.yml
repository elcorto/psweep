name: docs

on:
  workflow_run:
    workflows: ["tests"]
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # Only if tests have passed, not just if the tests workflow ran.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:

      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: build docs
        uses: ./.github/actions/build-docs

      - name: upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: doc/build/html

  # Same as tests.yml::tests-pass, but for docs. Required status check in the
  # tag ruleset to guard against releasing with broken docs.
  docs-pass:
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  # This (actions/deploy-pages) doesn't use the older gh-pages branch approach.
  # Instead, in Settings > Pages > Build and deployment > Source, set Source to
  # "GitHub Actions" (old setting: "Deploy from a branch").
  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
