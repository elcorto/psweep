name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        numpy_version: ["< 2", ">= 2"]

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v6

      - name: pysetup
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: get ruff version
        id: ruff-version
        run: |
          # Read the ruff version from .pre-commit-config.yaml so it stays the
          # single source of truth. Using https://pre-commit.ci/ is not fun
          # because of [1]: dependabot and pre-commit.ci don't update at the
          # same time, so ruff versions are always out of sync.
          #
          # [1] https://github.com/dependabot/dependabot-core/issues/1524
          ruff_version=$(grep -E -A1 'astral-sh/ruff-pre-commit' \
              .pre-commit-config.yaml | sed -nre "s/^\s+rev:.+'v([0-9\.]+)'/\1/p")
          if [ -z "$ruff_version" ]; then
              echo "error parsing ruff version, no match"
              exit 1
          fi
          echo "version=$ruff_version" >> "$GITHUB_OUTPUT"

      - name: lint
        uses: astral-sh/ruff-action@v3
        with:
          version: ${{ steps.ruff-version.outputs.version }}

      - name: format check
        uses: astral-sh/ruff-action@v3
        with:
          version: ${{ steps.ruff-version.outputs.version }}
          args: "format --check"

      - name: install deps
        run: |
          pip install "numpy ${{ matrix.numpy_version }}"
          pip install -e ".[test,dask]"

      - name: run tests
        run: |
          # CI runners have no configured git. Need that for git support tests.
          git config --global user.name "Gaylord Focker"
          git config --global user.email "gl@focker.com"

          # Run parallel tests (-n flag). Detect all $(pwd)/tests/test_*.py
          pytest -n4
