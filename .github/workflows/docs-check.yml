name: docs-check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v6

      - name: pysetup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: build
        run: |
          pip install -e ".[doc]"
          cd doc
          sh generate-doc.sh

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: doc/build/html
          if-no-files-found: error
